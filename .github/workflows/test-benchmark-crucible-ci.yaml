name: test-benchmark-crucible-ci

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}/test-benchmark-crucible-ci
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      only-docs: ${{ steps.filter.outputs.only_changed }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: tj-actions/changed-files@v47
        with:
          files: |
            LICENSE
            *.md
            **/*.md
            .github/rulesets/**
            .github/runners/**
            .github/workflows/faux-*.yaml
            .github/workflows/run-crucible-tracking.yaml
            .github/workflows/crucible-tracking.yaml
            .github/workflows/test-core-crucible-ci.yaml
            .github/workflows/test-tool-crucible-ci.yaml
            .github/workflows/core-crucible-ci.yaml
            .github/workflows/core-release-crucible-ci.yaml
            .github/workflows/tool-crucible-ci.yaml
            .github/actions/build-controller/**
            .github/actions/check-controller-build/**
            .github/actions/get-releases/**
            .github/actions/install-crucible/**
            docs/**

  call-benchmark-crucible-ci:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.only-docs != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        repos:
        - benchmark: "fio"
          branch: "master"
          filter: "all"
        - benchmark: "uperf"
          branch: "master"
          filter: "unique"
        - benchmark: "oslat"
          branch: "master"
          filter: "minimal"
    uses: ./.github/workflows/benchmark-crucible-ci.yaml
    with:
      ci_target: "${{ matrix.repos.benchmark }}"
      ci_target_branch: "${{ matrix.repos.branch }}"
      crucible_ci_test: "yes"
      crucible_ci_test_branch: "${{ github.ref }}"
      github_workspace: "$GITHUB_WORKSPACE"
      userenv_filter: "${{ matrix.repos.filter }}"
    secrets:
      ci_registry_auth: ${{ secrets.CRUCIBLE_CI_ENGINES_REGISTRY_AUTH }}
      quay_oauth_token: ${{ secrets.CRUCIBLE_QUAYIO_OAUTH_TOKEN }}

  faux-test-benchmark-crucible-ci:
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.only-docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "faux-test-benchmark-crucible-ci-complete"

  test-benchmark-crucible-ci-complete:
    runs-on: ubuntu-latest
    needs: [ call-benchmark-crucible-ci, faux-test-benchmark-crucible-ci ]
    if: always()
    steps:
      - name: Check Results
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "test-benchmark-crucible-ci-complete"
