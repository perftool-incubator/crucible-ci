name: benchmark-crucible-ci

on:
  workflow_call:
    inputs:
      ci_target:
        required: true
        type: string
      crucible_ci_test:
        required: false
        type: string
      ci_target_branch:
        required: true
        type: string
      crucible_ci_test_branch:
        required: false
        type: string
      github_workspace:
        required: true
        type: string
      userenv_filter:
        required: false
        type: string
        default: "all"
      runner_pool:
        required: false
        type: string
        default: "aws-cloud-1"
    secrets:
      registry_auth:
        required: false
      ci_registry_auth:
        required: false
      production_registry_auth:
        required: false
      quay_oauth_token:
        required: false

env:
  GITHUB_WORKSPACE: ${{ inputs.github_workspace }}

jobs:
  gen-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      endpoints: ${{ steps.get-endpoints.outputs.endpoints }}
    steps:
    - name: checkout crucible-ci default
      if: ${{ inputs.crucible_ci_test != 'yes' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/crucible-ci
        ref: main
        path: crucible-ci
    - name: checkout crucible-ci crucible_ci_test
      if: ${{ inputs.crucible_ci_test == 'yes' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/crucible-ci
        ref: ${{ inputs.crucible_ci_test_branch }}
        path: crucible-ci

    - name: checkout rickshaw
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/rickshaw
        ref: master
        path: rickshaw

    - name: get endpoints
      id: get-endpoints
      uses: ./crucible-ci/.github/actions/get-endpoints
      with:
        rickshaw-directory: "./rickshaw"
        benchmark: "${{ inputs.ci_target }}"

  display-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gen-endpoints
    steps:
    - name: Display endpoints
      run: echo '${{ needs.gen-endpoints.outputs.endpoints }}' | jq .

  call-endpoint-crucible-ci:
    needs:
    - gen-endpoints
    - display-endpoints
    strategy:
      fail-fast: false
      matrix:
        endpoint: ${{ fromJSON(needs.gen-endpoints.outputs.endpoints) }}
    uses: ./.github/workflows/endpoint-crucible-ci.yaml
    with:
      endpoint: "${{ matrix.endpoint }}"
      ci_target: "${{ inputs.ci_target }}"
      ci_target_dir: "bench-${{ inputs.ci_target }}"
      crucible_ci_test: "${{ inputs.crucible_ci_test }}"
      ci_target_branch: "${{ inputs.ci_target_branch }}"
      crucible_ci_test_branch: "${{ inputs.crucible_ci_test_branch }}"
      github_workspace: "${{ inputs.github_workspace }}"
      userenv_filter: "${{ inputs.userenv_filter }}"
      runner_pool: "${{ inputs.runner_pool }}"
      benchmark: "${{ inputs.ci_target }}"
    secrets:
      registry_auth: ${{ secrets.registry_auth }}
      ci_registry_auth: ${{ secrets.ci_registry_auth }}
      production_registry_auth: ${{ secrets.production_registry_auth }}
      quay_oauth_token: ${{ secrets.quay_oauth_token }}

  benchmark-crucible-ci-complete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
    - call-endpoint-crucible-ci
    steps:
    - name: Confirm Success
      run: echo "benchmark-crucible-ci-complete"
