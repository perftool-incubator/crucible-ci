name: core-crucible-ci

on:
  workflow_call:
    inputs:
      ci_target:
        required: true
        type: string
      ci_target_dir:
        required: false
        type: string
        default: ""
      crucible_ci_test:
        required: false
        type: string
        default: "no"
      ci_target_branch:
        required: true
        type: string
      crucible_ci_test_branch:
        required: false
        type: string
      github_workspace:
        required: true
        type: string
      userenv_filter:
        required: false
        type: string
        default: "all"
      release:
        required: false
        type: string
        default: "upstream"
      ci_built_controller:
        required: false
        type: string
        default: "no"
      ci_built_controller_tag:
        required: false
        type: string
        default: "--"
      disable_force_builds:
        required: false
        type: string
        default: "no"
      runner_pool:
        required: false
        type: string
        default: "aws-cloud-1"
    secrets:
      registry_auth:
        required: false
      weekly_ci_registry_auth:
        required: false
      ci_registry_auth:
        required: false
      production_registry_auth:
        required: false
      quay_oauth_token:
        required: false
env:
  GITHUB_WORKSPACE: ${{ inputs.github_workspace }}

jobs:
  gen-endpoints:
    name: gen-endpoints(${{ inputs.release }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      endpoints: ${{ steps.get-endpoints.outputs.endpoints }}
      ci_target_dir: ${{ steps.set-ci-target-dir.outputs.ci-target-dir }}
      timeout_minutes: ${{ steps.determine-timeout-minutes.outputs.timeout-minutes }}
    steps:
    - name: checkout crucible-ci default
      if: ${{ inputs.ci_target != 'crucible-ci' && inputs.crucible_ci_test != 'yes' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/crucible-ci
        ref: main
        path: crucible-ci
    - name: checkout crucible-ci ci_target
      if: ${{ inputs.ci_target == 'crucible-ci' && inputs.crucible_ci_test != 'yes' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/${{ inputs.ci_target }}
        ref: ${{ inputs.ci_target_branch }}
        path: crucible-ci
    - name: checkout crucible-ci crucible_ci_test
      if: ${{ inputs.crucible_ci_test == 'yes' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/crucible-ci
        ref: ${{ inputs.crucible_ci_test_branch }}
        path: crucible-ci

    - name: checkout rickshaw default
      if: ${{ inputs.ci_target != 'rickshaw' && inputs.release == 'upstream' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/rickshaw
        ref: master
        path: rickshaw
    - name: checkout rickshaw ci_target
      if: ${{ inputs.ci_target == 'rickshaw' && inputs.release == 'upstream' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/${{ inputs.ci_target }}
        ref: ${{ inputs.ci_target_branch }}
        path: rickshaw
        fetch-depth: 2
    - name: checkout rickshaw release
      if: ${{ inputs.release != 'upstream' }}
      uses: actions/checkout@v4
      with:
        repository: perftool-incubator/rickshaw
        ref: ${{ inputs.release }}
        path: rickshaw

    - name: get endpoints
      id: get-endpoints
      uses: ./crucible-ci/.github/actions/get-endpoints
      with:
        rickshaw-directory: "./rickshaw"

    - name: set ci_target_dir
      id: set-ci-target-dir
      run: |
        if [ "${{ inputs.ci_target_dir }}" == "" ]; then
          echo "Setting ci-target-dir to the value of inputs.ci_target [${{ inputs.ci_target }} ]"
          echo "ci-target-dir=${{ inputs.ci_target }}" >> $GITHUB_OUTPUT
        else
          echo "Setting ci-target-dir to the value of inputs.ci_target_dir [${{ inputs.ci_target_dir }} ]"
          echo "ci-target-dir=${{ inputs.ci_target_dir }}" >> $GITHUB_OUTPUT
        fi

    - name: determine timeout-minutes
      id: determine-timeout-minutes
      run: |
        if [ "${{ inputs.ci_built_controller }}" == "yes" ]; then
          build_controller_timeout_minutes=150
          echo "Setting timeout-minutes to the build controller value of '${build_controller_timeout_minutes}'"
          echo "timeout-minutes=${build_controller_timeout_minutes}" >> $GITHUB_OUTPUT
        else
          no_build_controller_timeout_minutes=90
          echo "Setting timeout-minutes to the no build controller value of '${no_build_controller_timeout_minutes}'"
          echo "timeout-minutes=${no_build_controller_timeout_minutes}" >> $GITHUB_OUTPUT
        fi

  display-endpoints:
    name: display-endpoints(${{ inputs.release }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gen-endpoints
    steps:
    - name: Display endpoints
      run: echo '${{ needs.gen-endpoints.outputs.endpoints }}' | jq .
    - name: Display ci_target_dir
      run: echo '${{ needs.gen-endpoints.outputs.ci_target_dir }}'
    - name: Display timeout_minutes
      run: echo '${{ needs.gen-endpoints.outputs.timeout_minutes }}'

  call-core-endpoint-crucible-ci:
    needs:
    - gen-endpoints
    - display-endpoints
    strategy:
      fail-fast: false
      matrix:
        endpoint: ${{ fromJSON(needs.gen-endpoints.outputs.endpoints) }}
    uses: ./.github/workflows/core-endpoint-crucible-ci.yaml
    with:
      endpoint: "${{ matrix.endpoint }}"
      ci_target: "${{ inputs.ci_target }}"
      ci_target_dir: "${{ needs.gen-endpoints.outputs.ci_target_dir }}"
      crucible_ci_test: "${{ inputs.crucible_ci_test }}"
      ci_target_branch: "${{ inputs.ci_target_branch }}"
      crucible_ci_test_branch: "${{ inputs.crucible_ci_test_branch }}"
      github_workspace: "${{ inputs.github_workspace }}"
      userenv_filter: "${{ inputs.userenv_filter }}"
      release: "${{ inputs.release }}"
      ci_built_controller: "${{ inputs.ci_built_controller }}"
      ci_built_controller_tag: "${{ inputs.ci_built_controller_tag }}"
      disable_force_builds: "${{ inputs.disable_force_builds }}"
      runner_pool: "${{ inputs.runner_pool }}"
      timeout_minutes: ${{ fromJSON(needs.gen-endpoints.outputs.timeout_minutes) }}
    secrets:
      registry_auth: ${{ secrets.registry_auth }}
      weekly_ci_registry_auth: ${{ secrets.weekly_ci_registry_auth }}
      ci_registry_auth: ${{ secrets.ci_registry_auth }}
      production_registry_auth: ${{ secrets.production_registry_auth }}
      quay_oauth_token: ${{ secrets.quay_oauth_token }}

  core-crucible-ci-complete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
    - call-core-endpoint-crucible-ci
    steps:
    - name: Confirm Success
      run: echo "core-crucible-ci-complete"
