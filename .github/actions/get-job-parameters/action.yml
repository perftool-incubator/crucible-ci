name: "crucible-ci get job parameters"
description: "Gets a list of jobs with the associated parameters"
inputs:
  toolbox-directory:
    description: "Where is the toolbox repository to reference"
    required: true
  rickshaw-directory:
    description: "Where is the rickshaw repository to query"
    required: true
  userenv-filter:
    description: "A filter to determine which userenvs should be included"
    required: false
    default: "all"
  runner-type:
    description: "What type of CI runner are the jobs for (github or self-hosted)?"
    required: true
  runner-tags:
    description: "Comma separated list of tags the runner has"
    required: false
    default: ""
  runner-pool:
    description: "Which pool of self-hosted runners to use (e.g., 'kmr-cloud-1', 'aws-cloud-1')"
    required: false
    default: ""
  benchmark:
    description: "Which benchmark to restrict the scenarios to"
    required: false
    default: "all"
outputs:
  jobs:
    description: "The list of userenvs that were found"
    value: ${{ steps.generate-jobs.outputs.jobs || steps.generate-jobs-legacy.outputs.jobs }}
runs:
  using: "composite"
  steps:
    - name: "Check if rickshaw supports --runner-pool"
      id: check-runner-pool
      shell: bash
      run: |
        if ${{ inputs.rickshaw-directory }}/util/generate-ci-jobs.py --help 2>&1 | grep -q -- '--runner-pool'; then
          echo "supports_runner_pool=true" >> $GITHUB_OUTPUT
        else
          echo "supports_runner_pool=false" >> $GITHUB_OUTPUT
        fi

    - name: "Generate jobs list (with runner-pool support)"
      id: generate-jobs
      if: steps.check-runner-pool.outputs.supports_runner_pool == 'true'
      shell: bash
      run: TOOLBOX_HOME=${{ inputs.toolbox-directory }} ${{ inputs.rickshaw-directory }}/util/generate-ci-jobs.py --runner-type "${{ inputs.runner-type }}" --runner-tags "${{ inputs.runner-tags }}" --runner-pool "${{ inputs.runner-pool }}" --userenv-filter "${{ inputs.userenv-filter }}" --runtime-env "github" --benchmark "${{ inputs.benchmark }}"

    - name: "Generate jobs list (without runner-pool support)"
      id: generate-jobs-legacy
      if: steps.check-runner-pool.outputs.supports_runner_pool == 'false'
      shell: bash
      run: TOOLBOX_HOME=${{ inputs.toolbox-directory }} ${{ inputs.rickshaw-directory }}/util/generate-ci-jobs.py --runner-type "${{ inputs.runner-type }}" --runner-tags "${{ inputs.runner-tags }}" --userenv-filter "${{ inputs.userenv-filter }}" --runtime-env "github" --benchmark "${{ inputs.benchmark }}"
