name: crucible-tracking

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
    secrets:
      private_key:
        required: true

jobs:
  project-tracking:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.private_key }}

      - name: Get project data
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ORGANIZATION: perftool-incubator
          PROJECT_NUMBER: 3
        run: |
          gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org){
                projectV2(number: $number) {
                  id
                  fields(first:20) {
                    nodes {
                      ... on ProjectV2Field {
                        id
                        name
                      }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -f org=$ORGANIZATION -F number=$PROJECT_NUMBER > project_data.json
          echo 'PROJECT_ID='$(jq '.data.organization.projectV2.id' project_data.json) >> $GITHUB_ENV
          echo 'DATE_FIELD_ID='$(jq '.data.organization.projectV2.fields.nodes[] | select(.name== "Date posted") | .id' project_data.json) >> $GITHUB_ENV
          echo 'STATUS_FIELD_ID='$(jq '.data.organization.projectV2.fields.nodes[] | select(.name== "Status") | .id' project_data.json) >> $GITHUB_ENV
          echo 'QUEUED_OPTION_ID='$(jq '.data.organization.projectV2.fields.nodes[] | select(.name== "Status") | .options[] | select(.name=="Queued") |.id' project_data.json) >> $GITHUB_ENV
          echo 'IN_PROGRESS_OPTION_ID='$(jq '.data.organization.projectV2.fields.nodes[] | select(.name== "Status") | .options[] | select(.name=="In Progress") |.id' project_data.json) >> $GITHUB_ENV

      - name: Add item to project
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ITEM_ID: ${{ github.event.pull_request && github.event.pull_request.node_id || github.event.issue.node_id }}
        run: |
          item_id="$( gh api graphql -f query='
            mutation($project:ID!, $item:ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $item}) {
                item {
                  id
                }
              }
            }' -f project=$PROJECT_ID -f item=$ITEM_ID --jq '.data.addProjectV2ItemById.item.id')"
          echo 'ITEM_ID='$item_id >> $GITHUB_ENV

      - name: Get current status
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          current_status="$(gh api graphql -f query='
            query($project: ID!, $item: ID!) {
              node(id: $item) {
                ... on ProjectV2Item {
                  fieldValueByName(name: "Status") {
                    ... on ProjectV2ItemFieldSingleSelectValue {
                      name
                    }
                  }
                }
              }
            }' -f project=$PROJECT_ID -f item=$ITEM_ID --jq '.data.node.fieldValueByName.name // empty')"
          echo "Current status: '${current_status}'"
          echo "CURRENT_STATUS=${current_status}" >> $GITHUB_ENV

      - name: Get date
        run: echo "DATE=$(date -u +"%Y-%m-%d")" >> $GITHUB_ENV

      - name: Set fields
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          STATUS_OPTION_ID: ${{ github.event.pull_request && env.IN_PROGRESS_OPTION_ID || env.QUEUED_OPTION_ID }}
        run: |
          # Only set status if the item does not already have one
          status_mutation=""
          if [ -z "${CURRENT_STATUS}" ]; then
            echo "No current status set, setting to requested value"
            status_mutation='set_status: updateProjectV2ItemFieldValue(input: {
              projectId: $project
              itemId: $item
              fieldId: $status_field
              value: {
                singleSelectOptionId: $status_value
              }
            }) {
              projectV2Item {
                id
              }
            }'
          else
            echo "Status already set to '${CURRENT_STATUS}', not overriding"
          fi

          gh api graphql -f query="
            mutation (
              \$project: ID!
              \$item: ID!
              \$status_field: ID!
              \$status_value: String!
              \$date_field: ID!
              \$date_value: Date!
            ) {
              ${status_mutation}
              set_date_posted: updateProjectV2ItemFieldValue(input: {
                projectId: \$project
                itemId: \$item
                fieldId: \$date_field
                value: {
                  date: \$date_value
                }
              }) {
                projectV2Item {
                  id
                }
              }
            }" -f project=$PROJECT_ID -f item=$ITEM_ID -f status_field=$STATUS_FIELD_ID -f status_value=${{ env.STATUS_OPTION_ID }} -f date_field=$DATE_FIELD_ID -f date_value=$DATE --silent
